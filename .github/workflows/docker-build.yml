name: Build and Push Docker Image

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  pull_request:
    branches:
      - main

env:
  ARTIFACT_LOCATION: europe-west1
  ARTIFACT_REPO_ID: quelpoke-sabrina
  IMAGE_NAME: quelpoke

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    outputs:
      image_tag: ${{ steps.meta.outputs.tags }}

    steps:
      - name: Checkout du code
        uses: actions/checkout@v4

      - name: Authentification GCP
        if: github.event_name != 'pull_request'
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Configuration gcloud CLI
        if: github.event_name != 'pull_request'
        uses: google-github-actions/setup-gcloud@v2

      - name: Connexion Docker à Artifact Registry
        if: github.event_name != 'pull_request'
        run: gcloud auth configure-docker ${{ env.ARTIFACT_LOCATION }}-docker.pkg.dev --quiet

      - name: Extraction des métadonnées (tags, labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.ARTIFACT_LOCATION }}-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/${{ env.ARTIFACT_REPO_ID }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=sha

      - name: Build et push de l'image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  deploy:
    needs: build-and-push
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest

    steps:
      - name: Authentification GCP
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Configuration gcloud CLI
        uses: google-github-actions/setup-gcloud@v2

      - name: Générer un token d'accès Artifact Registry
        id: token
        run: echo "token=$(gcloud auth print-access-token)" >> "$GITHUB_OUTPUT"

      - name: Déploiement sur la VM via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.GCP_VM_IP }}
          username: ${{ secrets.GCP_VM_USER }}
          key: ${{ secrets.GCP_VM_SSH_KEY }}
          envs: IMAGE
          script: |
            IMAGE="${{ env.ARTIFACT_LOCATION }}-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/${{ env.ARTIFACT_REPO_ID }}/${{ env.IMAGE_NAME }}:main"
            echo "${{ steps.token.outputs.token }}" | docker login -u oauth2accesstoken --password-stdin https://${{ env.ARTIFACT_LOCATION }}-docker.pkg.dev
            docker pull "$IMAGE"
            docker stop quelpoke || true
            docker rm quelpoke || true
            docker run -d --name quelpoke -p 8080:8080 --restart unless-stopped "$IMAGE"
